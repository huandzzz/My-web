<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Công Ty Quốc Việt</title>

    <!-- Font đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
        }

        nav a {
            margin: 0 10px;
            color: #38bdf8;
            text-decoration: none;
        }

        nav a:hover {
            color: #22c55e;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        #productList {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .product {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .product:hover {
            transform: scale(1.05);
            background: #334155;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #1e293b;
            margin-top: 30px;
        }
    </style>
</head>

<body onload="loadProducts()">

<header>
    <h1>🚀 Công Ty Quốc Việt</h1>
    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
    </nav>
</header>

<section>
    <h2>🔥 Danh sách sản phẩm</h2>
    <div id="productList"></div>
</section>

<footer>
    <p>© 2026 Công Ty Quốc Việt</p>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
